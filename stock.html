const topics=["AI概念股","半導體","AI伺服器","散熱","PCB/CCL","光通訊/網通","記憶體","金融","航運"];

function makeFullMarket(){
  const rows=[...seedStocks], used=new Set(rows.map(s=>s[0]));
  const names=["宏達","新光","中華","大同","精誠","新日興","仁寶","佳世達","威盛","華通","華新科","國巨","和碩","台化","台塑","台泥","統一","遠東新","長虹","大成鋼","可成","嘉澤","南亞","永豐金","台新金","合庫金","第一金","元大金"];
  for(let i=1101;i<=9999 && rows.length<1800;i++){
    const code=String(i).padStart(4,"0")+".TW";
    if(used.has(code)) continue;
    const topic=topics[(i*7)%topics.length];
    const name=names[i%names.length]+String(i).slice(-2);
    const en="TW Stock "+String(i);
    const price=Math.round((18+(i%900)+((i*13)%100)/100)*10)/10;
    const chg=Math.round((((i*37)%620)/100-2.8)*100)/100;
    let base=52+(i%38);
    if(["半導體","AI概念股","AI伺服器","散熱"].includes(topic)) base+=4;
    base=Math.max(42,Math.min(96,base));
    rows.push([code,name,en,topic,price,chg,base,topic+" 模擬資料"]);
  }
  return rows;
}

const stocks=makeFullMarket();

function qScore(s){
  return Math.max(40,Math.min(98,s[6]+(s[5]>1?3:0)+(s[5]<0?-4:0)+((Number(s[0].slice(0,4))*17)%7)/10));
}
function qSignal(sc){return sc>=88?"強勢推薦":sc>=80?"偏多觀察":sc>=70?"中性偏多":"觀察";}
function openStock(code){location.href=`stock.html?symbol=${encodeURIComponent(code)}`;}
function fmt(n){return Number(n).toLocaleString(undefined,{maximumFractionDigits:2});}

const params=new URLSearchParams(location.search);const symbol=params.get("symbol")||"2330.TW";const s=stocks.find(x=>x[0]===symbol)||stocks[0];const price=s[4],chg=s[5],score=qScore(s);
document.getElementById("pageTitle").textContent=s[1]+" "+s[0];document.getElementById("price").textContent=fmt(price);document.getElementById("chg").textContent=(chg>=0?"+":"")+chg.toFixed(2)+"%";document.getElementById("chg").className="metric-sub "+(chg>=0?"green":"red");document.getElementById("score").textContent=score.toFixed(1);document.getElementById("trend").textContent=score>=75?"偏多":"整理";document.getElementById("win").textContent=Math.round(score*.72)+"%";document.getElementById("risk").textContent=chg>2.8?"偏高":"中等";document.getElementById("action").textContent=chg>2.8?"不追高":"回測觀察";

const canvas=document.getElementById("chart"),ctx=canvas.getContext("2d"),dpr=window.devicePixelRatio||1;
function draw(){const rect=canvas.getBoundingClientRect();canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);const W=rect.width,H=rect.height;ctx.clearRect(0,0,W,H);const pad={l:18,r:70,t:25,b:20},priceH=330,volH=70,kdH=70,macdH=130;function x(i){return pad.l+i*(W-pad.l-pad.r)/80}function y(v){return pad.t+priceH-(v*priceH)}ctx.strokeStyle="rgba(148,163,184,.15)";for(let i=0;i<8;i++){let yy=pad.t+i*priceH/7;ctx.beginPath();ctx.moveTo(pad.l,yy);ctx.lineTo(W-pad.r,yy);ctx.stroke()}for(let i=0;i<80;i++){const xx=x(i),base=.5+Math.sin(i/9)*.16+i/280,up=Math.sin(i/4)>-.2;ctx.fillStyle=up?"#22c55e":"#fb3b5f";ctx.strokeStyle=ctx.fillStyle;ctx.beginPath();ctx.moveTo(xx,y(base+.07));ctx.lineTo(xx,y(base-.07));ctx.stroke();ctx.fillRect(xx-3,y(base+(up?.03:-.03)),6,Math.max(2,Math.abs(y(base+.03)-y(base-.03))))}ctx.strokeStyle="#facc15";ctx.beginPath();for(let i=0;i<80;i++){let yy=y(.46+Math.sin(i/11)*.08+i/300);if(i===0)ctx.moveTo(x(i),yy);else ctx.lineTo(x(i),yy)}ctx.stroke();ctx.strokeStyle="#38bdf8";ctx.beginPath();for(let i=0;i<80;i++){let yy=y(.42+Math.sin(i/14)*.06+i/330);if(i===0)ctx.moveTo(x(i),yy);else ctx.lineTo(x(i),yy)}ctx.stroke();let volTop=pad.t+priceH+15;for(let i=0;i<80;i++){let h=20+Math.abs(Math.sin(i))*50;ctx.fillStyle=i%2?"rgba(34,197,94,.45)":"rgba(251,59,95,.45)";ctx.fillRect(x(i)-3,volTop+volH-h,6,h)}ctx.fillStyle="#e2e8f0";ctx.fillText("Volume",pad.l+5,volTop+14);let kdTop=volTop+volH+20;ctx.strokeStyle="rgba(59,130,246,.35)";ctx.strokeRect(pad.l,kdTop,W-pad.l-pad.r,kdH);ctx.strokeStyle="#facc15";ctx.beginPath();for(let i=0;i<80;i++){let yy=kdTop+kdH/2+Math.sin(i/6)*22;if(i===0)ctx.moveTo(x(i),yy);else ctx.lineTo(x(i),yy)}ctx.stroke();ctx.strokeStyle="#fb7185";ctx.beginPath();for(let i=0;i<80;i++){let yy=kdTop+kdH/2+Math.sin(i/6+.8)*18;if(i===0)ctx.moveTo(x(i),yy);else ctx.lineTo(x(i),yy)}ctx.stroke();ctx.fillStyle="#e2e8f0";ctx.fillText("KD",pad.l+5,kdTop+14);let macdTop=kdTop+kdH+20;ctx.strokeStyle="rgba(59,130,246,.35)";ctx.strokeRect(pad.l,macdTop,W-pad.l-pad.r,macdH);for(let i=0;i<80;i++){let val=Math.sin(i/7)*45;ctx.fillStyle=val>=0?"#16a34a":"#dc2626";let mid=macdTop+macdH/2;ctx.fillRect(x(i)-3,val>=0?mid-val:mid,6,Math.abs(val))}ctx.strokeStyle="#38bdf8";ctx.beginPath();for(let i=0;i<80;i++){let yy=macdTop+macdH/2-Math.sin(i/9)*42;if(i===0)ctx.moveTo(x(i),yy);else ctx.lineTo(x(i),yy)}ctx.stroke();ctx.strokeStyle="#fb923c";ctx.beginPath();for(let i=0;i<80;i++){let yy=macdTop+macdH/2-Math.sin(i/9+.7)*32;if(i===0)ctx.moveTo(x(i),yy);else ctx.lineTo(x(i),yy)}ctx.stroke();ctx.fillStyle="#e2e8f0";ctx.fillText("MACD 完整顯示",pad.l+5,macdTop+14);}
draw();window.addEventListener("resize",draw);function updateClock(){document.getElementById("clock")?.remove}
