<style>

.toast{position:fixed;right:24px;bottom:24px;background:linear-gradient(135deg,#0284c7,#9333ea);padding:14px 18px;border-radius:14px;box-shadow:0 0 30px rgba(56,189,248,.35);font-weight:900;opacity:0;transform:translateY(20px);transition:.25s;z-index:10}.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:900px){.app{padding:14px 10px}.topbar{grid-template-columns:1fr}.title{font-size:28px}.subtitle{letter-spacing:1px;font-size:12px}.clock,.date{text-align:left}th,td{font-size:12px;padding:8px}.panel{padding:12px}}

.controls{display:grid;grid-template-columns:1fr 180px 180px;gap:12px;margin:18px 0}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.metric{min-height:92px;border-radius:15px;padding:13px;background:linear-gradient(180deg,rgba(15,23,42,.78),rgba(2,6,23,.62));border:1px solid rgba(59,130,246,.48)}.metric-title{color:#bae6fd;font-size:12px;font-weight:950}.metric-value{font-size:25px;font-weight:950;margin-top:8px}.metric-sub{font-size:12px;color:#94a3b8;margin-top:4px;font-weight:800}
@media(max-width:900px){.controls,.metrics{grid-template-columns:1fr}}
</style></head>
<body>

</div><div class="toast" id="toast">完成</div>

const seedStocks=[

["2882.TW","國泰金","Cathay","金融",67.8,.51,67,"大型金控"],

["2884.TW","玉山金","E.SUN","金融",31.2,.18,60,"金融股"],

["2603.TW","長榮","Evergreen","航運",215,1.32,74,"貨櫃航運"],
["2615.TW","萬海","Wan Hai","航運",86.4,.88,69,"貨櫃航運"],
["2609.TW","陽明","Yang Ming","航運",78.2,-.13,63,"貨櫃航運"],

["2610.TW","華航","China Airlines","航運",25.2,.46,62,"航空運輸"]
];

const topics=["AI概念股","半導體","AI伺服器","散熱","PCB/CCL","光通訊/網通","記憶體","金融","航運"];

function makeFullMarket(){
  const rows=[...seedStocks], used=new Set(rows.map(s=>s[0]));
  const names=["宏達","新光","中華","大同","精誠","新日興","仁寶","佳世達","威盛","華通","華新科","國巨","和碩","台化","台塑","台泥","統一","遠東新","長虹","大成鋼","可成","嘉澤","南亞","永豐金","台新金","合庫金","第一金","元大金"];
  for(let i=1101;i<=9999 && rows.length<1800;i++){
    const code=String(i).padStart(4,"0")+".TW";
    if(used.has(code)) continue;
    const topic=topics[(i*7)%topics.length];
    const name=names[i%names.length]+String(i).slice(-2);
    const en="TW Stock "+String(i);
    const price=Math.round((18+(i%900)+((i*13)%100)/100)*10)/10;
    const chg=Math.round((((i*37)%620)/100-2.8)*100)/100;
    let base=52+(i%38);
    if(["半導體","AI概念股","AI伺服器","散熱"].includes(topic)) base+=4;
    base=Math.max(42,Math.min(96,base));
    rows.push([code,name,en,topic,price,chg,base,topic+" 模擬資料"]);
  }
  return rows;
}

const stocks=makeFullMarket();

function qScore(s){
  return Math.max(40,Math.min(98,s[6]+(s[5]>1?3:0)+(s[5]<0?-4:0)+((Number(s[0].slice(0,4))*17)%7)/10));
}
function qSignal(sc){return sc>=88?"強勢推薦":sc>=80?"偏多觀察":sc>=70?"中性偏多":"觀察";}
function openStock(code){location.href=`stock.html?symbol=${encodeURIComponent(code)}`;}
function fmt(n){return Number(n).toLocaleString(undefined,{maximumFractionDigits:2});}

let limit=50;
function showToast(msg){const t=document.querySelector(".toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1700)}
function scan(){const rows=stocks.slice(0,limit).sort((a,b)=>qScore(b)-qScore(a)).slice(0,10);document.getElementById("rows").innerHTML=rows.map((s,i)=>{const sc=qScore(s),ch=s[5];return `<tr onclick="openStock('${s[0]}')"><td>${i+1}</td><td><b>${s[1]}</b><br><span style="color:#94a3b8">${s[0]}</span></td><td><span class="score-pill">${sc.toFixed(1)}</span><br><span style="color:#94a3b8">${qSignal(sc)}</span></td><td class="${ch>=0?'green':'red'}">${ch>=0?'+':''}${ch.toFixed(2)}%</td><td>${s[3]}</td><td>${s[7]}</td><td class="cyan">分析 →</td></tr>`}).join("");document.getElementById("mPool").textContent=stocks.length;document.getElementById("mScan").textContent=limit;document.getElementById("mTop").textContent=rows.length?qScore(rows[0]).toFixed(1):"--";document.getElementById("mTopName").textContent=rows.length?`${rows[0][0]} ${rows[0][1]}`:"--";showToast(`已掃描 ${limit} 檔`)}
function search(q){q=q.trim().toLowerCase();if(!q)return[];return stocks.filter(s=>s[0].toLowerCase().includes(q)||s[1].toLowerCase().includes(q)||s[2].toLowerCase().includes(q)||s[3].toLowerCase().includes(q)).slice(0,10)}
function renderSearch(q){const box=document.getElementById("searchResults");const m=search(q);if(!q||m.length===0){box.style.display="none";box.innerHTML="";return}box.style.display="block";box.innerHTML=m.map(s=>`<div class="search-item" onclick="openStock('${s[0]}')">${s[0]}｜${s[1]}｜${s[3]}</div>`).join("")}
document.getElementById("scanLimit").onchange=e=>{limit=Number(e.target.value);document.getElementById("mScan").textContent=limit};
document.getElementById("scanBtn").onclick=scan;
document.getElementById("searchInput").addEventListener("input",e=>renderSearch(e.target.value));
document.getElementById("searchInput").addEventListener("keydown",e=>{if(e.key==="Enter"){const m=search(e.target.value)[0];if(m)openStock(m[0]);}});
function updateClock(){document.getElementById("clock").textContent=new Date().toLocaleTimeString("zh-TW",{hour12:false})}setInterval(updateClock,1000);updateClock();scan();
</script></body></html>
