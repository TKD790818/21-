<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V23.3 Quantum Topic Radar</title>
<style>
:root{--cyan:#18d5ff;--blue:#2563eb;--purple:#9333ea;--green:#22c55e;--red:#fb3b5f;--yellow:#facc15}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;color:white;background:radial-gradient(circle at 8% 8%,rgba(24,213,255,.22),transparent 28%),radial-gradient(circle at 92% 8%,rgba(147,51,234,.26),transparent 30%),linear-gradient(135deg,#020617,#061121 48%,#030712)}
.app{max-width:1380px;margin:0 auto;padding:22px}
.topbar{display:grid;grid-template-columns:1fr 230px;gap:16px}
.title{font-size:42px;font-weight:950;line-height:1;background:linear-gradient(90deg,#1fd7ff,#60a5fa,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{margin-top:10px;color:#bae6fd;letter-spacing:3px;font-weight:900}
.clock{text-align:right;font-size:26px;font-weight:950}.date{text-align:right;color:#c7d2fe;font-weight:700;margin-top:4px}
.panel{border:1px solid rgba(59,130,246,.48);background:linear-gradient(180deg,rgba(7,17,35,.82),rgba(2,6,23,.66));border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.33),inset 0 1px 0 rgba(255,255,255,.07);padding:16px}
.controls{display:grid;grid-template-columns:1fr 180px 180px;gap:12px;margin:18px 0}
.input,.select{width:100%;height:46px;border-radius:12px;background:linear-gradient(180deg,rgba(15,23,42,.85),rgba(2,6,23,.75));border:1px solid rgba(96,165,250,.65);color:white;padding:0 14px;font-size:16px;outline:none}
.btn{border:0;border-radius:14px;color:white;padding:13px 16px;font-size:15px;font-weight:950;cursor:pointer;background:linear-gradient(135deg,#0284c7 0%,#2563eb 45%,#c026d3 100%);box-shadow:0 0 28px rgba(56,189,248,.28),0 14px 34px rgba(37,99,235,.26),inset 0 1px 0 rgba(255,255,255,.20)}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.metric{min-height:92px;border-radius:15px;padding:13px;background:linear-gradient(180deg,rgba(15,23,42,.78),rgba(2,6,23,.62));border:1px solid rgba(59,130,246,.48)}
.metric-title{color:#bae6fd;font-size:12px;font-weight:950}.metric-value{font-size:25px;font-weight:950;margin-top:8px}.metric-sub{font-size:12px;color:#94a3b8;margin-top:4px;font-weight:800}
.green{color:#22c55e}.red{color:#fb3b5f}.cyan{color:#18d5ff}.purple{color:#c084fc}.yellow{color:#facc15}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.topic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.topic-card{border:1px solid rgba(59,130,246,.38);border-radius:16px;padding:14px;background:rgba(2,6,23,.45);cursor:pointer;transition:.15s}
.topic-card:hover,.topic-card.active{background:linear-gradient(135deg,rgba(14,165,233,.22),rgba(147,51,234,.24));border-color:rgba(125,211,252,.8)}
.topic-title{font-size:18px;font-weight:950}.topic-sub{font-size:12px;color:#94a3b8;margin-top:6px}.topic-score{margin-top:10px;font-size:22px;font-weight:950;color:#22d3ee}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:10px 8px;border-bottom:1px solid rgba(59,130,246,.18);text-align:left}th{color:#bae6fd}td{font-weight:750}
tbody tr{cursor:pointer}tbody tr:hover{background:rgba(56,189,248,.10)}
.score-pill{background:rgba(14,165,233,.18);border:1px solid rgba(14,165,233,.35);color:#38bdf8;border-radius:8px;padding:4px 9px;font-weight:950}
.search-wrap{position:relative}.search-results{margin-top:8px;max-height:220px;overflow:auto;border:1px solid rgba(59,130,246,.38);border-radius:12px;background:rgba(2,6,23,.94);display:none;position:absolute;z-index:5;left:0;right:0}.search-item{padding:10px 12px;border-bottom:1px solid rgba(59,130,246,.18);cursor:pointer;font-weight:800;color:#dbeafe}.search-item:hover{background:rgba(56,189,248,.12)}
.bottom{margin-top:16px}
.toast{position:fixed;right:24px;bottom:24px;background:linear-gradient(135deg,#0284c7,#9333ea);padding:14px 18px;border-radius:14px;box-shadow:0 0 30px rgba(56,189,248,.35);font-weight:900;opacity:0;transform:translateY(20px);transition:.25s;z-index:10}.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:980px){.app{padding:14px 10px}.topbar,.controls,.layout{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.topic-grid{grid-template-columns:1fr}.title{font-size:28px}.subtitle{letter-spacing:1px;font-size:12px}.clock,.date{text-align:left}th,td{font-size:12px;padding:8px}.panel{padding:12px}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="title">V23.3 Quantum Topic Radar</div>
      <div class="subtitle">掃描 Top10 獨立一區｜九大題材點進去看全部個股</div>
    </div>
    <div><div class="clock" id="clock">--:--:--</div><div class="date">UTC+8｜GITHUB PAGES</div></div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <input class="input" id="searchInput" placeholder="搜尋：2330 / 台積電 / 世芯 / 散熱" autocomplete="off"/>
      <div class="search-results" id="searchResults"></div>
    </div>
    <select class="select" id="scanLimit">
      <option value="10">掃描 10 檔</option>
      <option value="30">掃描 30 檔</option>
      <option value="50" selected>掃描 50 檔</option>
      <option value="100">掃描 100 檔</option>
      <option value="300">掃描 300 檔</option>
      <option value="500">掃描 500 檔</option>
    </select>
    <button class="btn" id="scanBtn">⚡ 掃描全市場</button>
  </div>

  <section class="metrics">
    <div class="metric"><div class="metric-title">全市場股票池</div><div class="metric-value cyan" id="mPool">--</div><div class="metric-sub">模擬全台股資料庫</div></div>
    <div class="metric"><div class="metric-title">目前掃描</div><div class="metric-value yellow" id="mScan">50</div><div class="metric-sub">只影響掃描 Top10</div></div>
    <div class="metric"><div class="metric-title">目前題材</div><div class="metric-value purple" id="mTopic">AI概念股</div><div class="metric-sub">點題材看全部個股</div></div>
    <div class="metric"><div class="metric-title">題材檔數</div><div class="metric-value green" id="mTopicCount">--</div><div class="metric-sub">該分類全部個股</div></div>
  </section>

  <div class="layout">
    <div class="panel">
      <h2 style="margin-top:0;color:#facc15">⚡ 全市場掃描 Top10</h2>
      <table>
        <thead><tr><th>排名</th><th>股票</th><th>AI分數</th><th>漲跌</th><th>題材</th><th>操作</th></tr></thead>
        <tbody id="scanRows"></tbody>
      </table>
    </div>

    <div class="panel">
      <h2 style="margin-top:0;color:#38bdf8">📌 九大題材股</h2>
      <div class="topic-grid" id="topicGrid"></div>
    </div>
  </div>

  <div class="panel bottom">
    <h2 style="margin-top:0;color:#c084fc">📂 <span id="topicTitle">AI概念股</span>｜全部股票</h2>
    <table>
      <thead><tr><th>排名</th><th>股票</th><th>AI分數</th><th>漲跌</th><th>題材</th><th>操作</th></tr></thead>
      <tbody id="topicRows"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast">完成</div>

<script>
const seedStocks=[
["2330.TW","台積電","TSMC","半導體",2295,.53,93],["2454.TW","聯發科","MediaTek","半導體",1330,1.14,86],["2303.TW","聯電","UMC","半導體",52.3,.42,68],["3034.TW","聯詠","Novatek","半導體",515,.66,74],["2379.TW","瑞昱","Realtek","半導體",585,-.35,65],["3443.TW","創意","GUC","半導體",1560,2.18,80],["3529.TWO","力旺","eMemory","半導體",2520,1.72,81],
["2382.TW","廣達","Quanta","AI伺服器",285,2.35,84],["6669.TW","緯穎","Wiwynn","AI伺服器",2570,1.64,82],["3231.TW","緯創","Wistron","AI伺服器",118,1.25,75],["2356.TW","英業達","Inventec","AI伺服器",54.6,.74,70],["2317.TW","鴻海","Hon Hai","AI伺服器",158,.64,72],
["3661.TW","世芯-KY","Alchip","AI概念股",4135,3.25,78],["2376.TW","技嘉","GIGABYTE","AI概念股",298,1.18,74],["2377.TW","微星","MSI","AI概念股",185,.95,71],["2357.TW","華碩","ASUS","AI概念股",515,.88,72],["2308.TW","台達電","Delta","AI概念股",415,1.3,81],
["3017.TW","奇鋐","Auras","散熱",720,3.12,88],["3324.TWO","雙鴻","Shuang Hong","散熱",825,2.58,84],["3653.TW","健策","Jentech","散熱",1380,1.36,79],["6230.TW","尼得科超眾","CCI","散熱",268,.92,72],["2421.TW","建準","Sunon","散熱",118,.86,68],
["8046.TW","南電","Nan Ya PCB","PCB/CCL",265,1.42,74],["3037.TW","欣興","Unimicron","PCB/CCL",182,.55,72],["2383.TW","台光電","Elite Material","PCB/CCL",590,2.08,82],["6274.TW","台燿","TUC","PCB/CCL",205,1.88,79],["2368.TW","金像電","Gold Circuit","PCB/CCL",255,1.28,76],
["4979.TWO","華星光","LuxNet","光通訊/網通",215,2.92,83],["3163.TWO","波若威","Browave","光通訊/網通",186,1.72,77],["3363.TWO","上詮","FoCI","光通訊/網通",210,1.8,78],["2345.TW","智邦","Accton","光通訊/網通",815,1.65,81],["3596.TW","智易","Arcadyan","光通訊/網通",196,.72,69],["5388.TWO","中磊","Sercomm","光通訊/網通",138,-.18,63],
["2408.TW","南亞科","Nanya","記憶體",69.8,1.88,73],["8299.TWO","群聯","Phison","記憶體",610,2.15,79],["2344.TW","華邦電","Winbond","記憶體",28.4,.92,65],["2337.TW","旺宏","Macronix","記憶體",31.2,-.45,61],
["2881.TW","富邦金","Fubon","金融",88.5,.34,65],["2882.TW","國泰金","Cathay","金融",67.8,.51,67],["2891.TW","中信金","CTBC","金融",41.2,.29,64],["2886.TW","兆豐金","Mega","金融",42.5,.16,62],["2884.TW","玉山金","E.SUN","金融",31.2,.18,60],
["2603.TW","長榮","Evergreen","航運",215,1.32,74],["2615.TW","萬海","Wan Hai","航運",86.4,.88,69],["2609.TW","陽明","Yang Ming","航運",78.2,-.13,63],["2618.TW","長榮航","EVA Air","航運",38.5,.58,66],["2610.TW","華航","China Airlines","航運",25.2,.46,62]
];

const topics=["AI概念股","半導體","AI伺服器","散熱","PCB/CCL","光通訊/網通","記憶體","金融","航運"];

function makeFullMarket(){
  const rows=[...seedStocks], used=new Set(rows.map(s=>s[0]));
  const names=["宏達","新光","中華","大同","精誠","新日興","仁寶","佳世達","威盛","華通","華新科","國巨","和碩","台化","台塑","台泥","統一","遠東新","長虹","大成鋼","可成","嘉澤","南亞","永豐金","台新金","合庫金","第一金","元大金"];
  for(let i=1101;i<=9999 && rows.length<1800;i++){
    const code=String(i).padStart(4,"0")+".TW";
    if(used.has(code)) continue;
    const topic=topics[(i*7)%topics.length];
    const name=names[i%names.length]+String(i).slice(-2);
    const en="TW Stock "+String(i);
    const price=Math.round((18+(i%900)+((i*13)%100)/100)*10)/10;
    const chg=Math.round((((i*37)%620)/100-2.8)*100)/100;
    let base=52+(i%38);
    if(["半導體","AI概念股","AI伺服器","散熱"].includes(topic)) base+=4;
    base=Math.max(42,Math.min(96,base));
    rows.push([code,name,en,topic,price,chg,base]);
  }
  return rows;
}

const stocks=makeFullMarket();
let state={topic:"AI概念股",scanLimit:50};

function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1700)}
function score(s){return Math.max(40,Math.min(98,s[6]+(s[5]>1?3:0)+(s[5]<0?-4:0)+((Number(s[0].slice(0,4))*17)%7)/10))}
function signal(sc){return sc>=85?"強勢觀察":sc>=75?"偏多":sc>=65?"中性偏多":"觀察"}
function openStock(code){location.href=`stock.html?symbol=${encodeURIComponent(code)}`}
function rowHtml(rows){return rows.map((s,i)=>{const sc=score(s),ch=s[5];return `<tr onclick="openStock('${s[0]}')"><td>${i+1}</td><td><b>${s[1]}</b><br><span style="color:#94a3b8">${s[0]}</span></td><td><span class="score-pill">${sc.toFixed(1)}</span><br><span style="color:#94a3b8">${signal(sc)}</span></td><td class="${ch>=0?'green':'red'}">${ch>=0?'+':''}${ch.toFixed(2)}%</td><td>${s[3]}</td><td class="cyan">分析 →</td></tr>`}).join("")}

function scanMarket(){
  const rows=stocks.slice(0,state.scanLimit).sort((a,b)=>score(b)-score(a)).slice(0,10);
  document.getElementById("scanRows").innerHTML=rowHtml(rows);
  document.getElementById("mScan").textContent=state.scanLimit;
  showToast(`已掃描全市場 ${state.scanLimit} 檔`);
}

function renderTopics(){
  document.getElementById("topicGrid").innerHTML=topics.map(t=>{
    const arr=stocks.filter(s=>s[3]===t);
    const avg=arr.length?Math.round(arr.reduce((a,b)=>a+score(b),0)/arr.length):0;
    const active=t===state.topic?"active":"";
    return `<div class="topic-card ${active}" onclick="selectTopic('${t}')"><div class="topic-title">${t}</div><div class="topic-sub">${arr.length} 檔股票｜點擊查看全部</div><div class="topic-score">${avg}</div></div>`
  }).join("");
}

function renderTopicStocks(){
  const rows=stocks.filter(s=>s[3]===state.topic).sort((a,b)=>score(b)-score(a));
  document.getElementById("topicRows").innerHTML=rowHtml(rows);
  document.getElementById("topicTitle").textContent=state.topic;
  document.getElementById("mTopic").textContent=state.topic;
  document.getElementById("mTopicCount").textContent=rows.length;
}

window.selectTopic=(t)=>{
  state.topic=t;
  renderTopics();
  renderTopicStocks();
  showToast(`已切換：${t}`);
}

function search(q){
  q=q.trim().toLowerCase();
  if(!q)return[];
  return stocks.filter(s=>s[0].toLowerCase().includes(q)||s[1].toLowerCase().includes(q)||s[2].toLowerCase().includes(q)||s[3].toLowerCase().includes(q)).slice(0,10);
}
function renderSearch(q){
  const box=document.getElementById("searchResults");
  const m=search(q);
  if(!q||m.length===0){box.style.display="none";box.innerHTML="";return}
  box.style.display="block";
  box.innerHTML=m.map(s=>`<div class="search-item" onclick="openStock('${s[0]}')">${s[0]}｜${s[1]}｜${s[3]}</div>`).join("");
}

document.getElementById("mPool").textContent=stocks.length;
document.getElementById("searchInput").addEventListener("input",e=>renderSearch(e.target.value));
document.getElementById("searchInput").addEventListener("keydown",e=>{if(e.key==="Enter"){const m=search(e.target.value)[0];if(m)openStock(m[0]);else showToast("找不到股票")}});
document.getElementById("scanLimit").addEventListener("change",e=>{state.scanLimit=Number(e.target.value);document.getElementById("mScan").textContent=state.scanLimit});
document.getElementById("scanBtn").addEventListener("click",scanMarket);

function updateClock(){document.getElementById("clock").textContent=new Date().toLocaleTimeString("zh-TW",{hour12:false})}
setInterval(updateClock,1000);
updateClock();
renderTopics();
renderTopicStocks();
scanMarket();
</script>
</body>
</html>
